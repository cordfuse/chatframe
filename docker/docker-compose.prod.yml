# Quill — production single-host compose, Caddy-fronted with auto-HTTPS.
#
# Caddy terminates TLS at the edge (uses Let's Encrypt for public domains
# automatically) and reverse-proxies to the app on a private compose network.
# The app itself is not exposed on a host port.
#
# Pre-flight:
#   1. Edit ./Caddyfile and replace YOUR_DOMAIN with your actual hostname.
#   2. cp .env.example .env  →  fill in JWT_SECRET, ANTHROPIC_API_KEY, etc.
#   3. docker compose -f docker-compose.prod.yml up -d --build
#   4. Caddy will provision a TLS cert on first request to your domain.

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: cordfuse/quill:prod
    container_name: quill
    restart: unless-stopped

    env_file:
      - .env

    environment:
      QUILL_CONFIG_DIR: /app/config

      QUILL_PROVIDER: ${QUILL_PROVIDER:-anthropic}
      QUILL_MODEL: ${QUILL_MODEL:-claude-sonnet-4-6}
      QUILL_SYSTEM_PROMPT: ${QUILL_SYSTEM_PROMPT:-You are a helpful AI assistant.}
      QUILL_TEMPERATURE: ${QUILL_TEMPERATURE:-1.0}

      QUILL_SHOW_SETTINGS:     ${QUILL_SHOW_SETTINGS:-1}
      QUILL_PERSIST_CHAT:      ${QUILL_PERSIST_CHAT:-1}
      QUILL_SHOW_WEB_SEARCH:   ${QUILL_SHOW_WEB_SEARCH:-1}
      QUILL_SHOW_MCP:          ${QUILL_SHOW_MCP:-1}
      QUILL_SHOW_MODEL_PICKER: ${QUILL_SHOW_MODEL_PICKER:-1}
      QUILL_SHOW_ATTACHMENTS:  ${QUILL_SHOW_ATTACHMENTS:-1}

    volumes:
      # Persistent config volume — same convention as the dev compose.
      # Point this at wherever the operator keeps Quill's config on the host
      # (e.g. /srv/quill-config:/app/config).
      - ../nodejs/config:/app/config

    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    container_name: quill-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data       # ACME state, must persist for cert reuse
      - caddy-config:/config
    networks:
      - internal
    depends_on:
      - app

volumes:
  caddy-data:
  caddy-config:

networks:
  internal:
